name: Dev Release

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: coree-linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: coree-linux-aarch64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: coree-macos-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: coree-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: dev-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.artifact }} -C target/${{ matrix.target }}/release coree

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target\${{ matrix.target }}\release\coree.exe -DestinationPath ${{ matrix.artifact }}

      - name: Ensure dev release exists
        # The || true handles the race where multiple parallel jobs all try to create
        # the release at the same time - only one succeeds, the rest fail silently.
        # shell: bash required - Windows runners default to PowerShell which misparses
        # the || operator and -- flags in multi-line shell expressions.
        shell: bash
        run: |
          gh release view dev --repo ${{ github.repository }} \
            || gh release create dev \
                 --prerelease \
                 --title "Dev builds (main branch)" \
                 --notes "Automatically updated on every push to main. Install via \`/plugin install coree-dev\` in Claude Code." \
                 --repo ${{ github.repository }} \
            || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        shell: bash
        run: gh release upload dev ${{ matrix.artifact }} --clobber --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Runs after all build jobs so dev-version.txt is only updated once all
  # platform binaries are in place. The dev bootstrap reads this file first
  # and uses the SHA as a freshness signal - updating it last ensures
  # a consistent release is always available when the SHA changes.
  publish-version:
    name: Publish dev-version.txt
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Write commit SHA
        run: printf '%s' "${{ github.sha }}" > dev-version.txt

      - name: Upload dev-version.txt
        run: gh release upload dev dev-version.txt --clobber --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dry-run of the full npm publish pipeline on every main push.
  # Uses npm pack instead of npm publish so no npm auth is needed.
  # Uploads .tgz files to the dev GitHub release for manual install testing.
  pack-npm-dev:
    name: Pack npm packages (dev)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set dev version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          DEV_VERSION="${VERSION}-dev.${{ github.run_number }}"
          echo "DEV_VERSION=${DEV_VERSION}" >> $GITHUB_ENV
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('npm/@coree-ai/coree/package.json','utf8')); p.version='${DEV_VERSION}'; fs.writeFileSync('npm/@coree-ai/coree/package.json', JSON.stringify(p,null,2)+'\n');"

      - name: Download build artifacts from dev release
        run: gh release download dev --repo ${{ github.repository }} --dir dist/ --pattern 'coree-*'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract artifacts
        run: |
          cd dist
          for f in *.tar.gz; do
            tar xzf "$f"
            mv coree "${f%.tar.gz}"
          done
          for f in *.zip; do
            unzip -o "$f"
            mv coree.exe "${f%.zip}.exe"
          done

      - name: Fetch embedding model
        run: |
          pip install huggingface_hub --quiet
          python3 scripts/fetch-model.py dist/model

      - name: Generate npm packages
        run: node scripts/generate-npm-packages.mjs

      - name: Pack npm packages
        run: |
          npm pack npm/@coree-ai/coree-model-bge-small-en-v1.5 --pack-destination dist/
          for pkg in npm/@coree-ai/coree-linux-x64 npm/@coree-ai/coree-linux-arm64 npm/@coree-ai/coree-darwin-arm64 npm/@coree-ai/coree-win32-x64; do
            npm pack "$pkg" --pack-destination dist/
          done
          npm pack npm/@coree-ai/coree --pack-destination dist/

      - name: Upload npm packs to dev release
        run: gh release upload dev dist/coree-ai-*.tgz --clobber --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
