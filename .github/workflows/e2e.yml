name: E2E

# Verifies the full install chain on every target platform:
#   1. Build release binary
#   2. Run tyto.cmd with TYTO_BINARY_OVERRIDE -> verifies tyto.cmd -> tyto-bootstrap -> tyto chain
#   3. `tyto --version` and `tyto status` smoke tests
#   4. Inject state and MCP store + search E2E

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: E2E (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tyto-linux-x86_64.tar.gz
            binary: tyto
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: tyto-linux-aarch64.tar.gz
            binary: tyto
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tyto-macos-aarch64.tar.gz
            binary: tyto
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tyto-windows-x86_64.zip
            binary: tyto.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Set binary path
        shell: bash
        run: |
          echo "TYTO_BIN=$GITHUB_WORKSPACE/target/${{ matrix.target }}/release/${{ matrix.binary }}" >> "$GITHUB_ENV"

      # Verify the full chain: tyto.cmd -> committed tyto-bootstrap -> TYTO_BINARY_OVERRIDE -> tyto
      - name: Bootstrap chain - tyto.cmd routes to tyto via override
        shell: bash
        env:
          TYTO_BINARY_OVERRIDE: ${{ env.TYTO_BIN }}
        run: agents/shared/scripts/tyto.cmd --version

      - name: Binary - version
        shell: bash
        run: |
          "$TYTO_BIN" --version

      - name: Binary - status (DB open, migrations, query)
        shell: bash
        run: |
          SMOKE_DIR="$RUNNER_TEMP/smoke"
          mkdir -p "$SMOKE_DIR"
          printf 'project_id = "e2e-smoke"\n' > "$SMOKE_DIR/.tyto.toml"
          (cd "$SMOKE_DIR" && "$TYTO_BIN" status)

      # Deterministic inject state tests - manipulate serve.lock / serve.ready
      # directly instead of racing against the model download window.
      - name: Inject - loading and ready state messages
        shell: bash
        run: python3 scripts/test_inject_states.py "$TYTO_BIN"

      - name: Binary - MCP store + search
        shell: bash
        run: python3 scripts/e2e_mcp.py "$TYTO_BIN"
